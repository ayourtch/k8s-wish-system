---
# Deployments using the unified wish-system-runtime image
# Both controllers use the same image but different entry points
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wish-grantor
  namespace: wish-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wish-grantor
  template:
    metadata:
      labels:
        app: wish-grantor
    spec:
      serviceAccountName: wish-grantor
      containers:
      - name: controller
        image: wish-system-runtime:latest
        command: ["/usr/local/bin/wish-grantor"]
        imagePullPolicy: IfNotPresent
        env:
        - name: RUST_LOG
          value: "info"
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wish-fulfiller
  namespace: wish-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wish-fulfiller
  template:
    metadata:
      labels:
        app: wish-fulfiller
    spec:
      serviceAccountName: wish-fulfiller
      containers:
      - name: controller
        image: wish-system-runtime:latest
        command: ["/usr/local/bin/wish-fulfiller"]
        imagePullPolicy: IfNotPresent
        env:
        - name: RUST_LOG
          value: "info"
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
