---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wish-fulfiller
  namespace: wish-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wish-fulfiller-role
rules:
# Wish CRD access
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes/status"]
  verbs: ["get", "patch", "update"]
# Impersonation permissions - allows wish-fulfiller to execute as the wish creator
- apiGroups: [""]
  resources: ["users", "groups", "serviceaccounts"]
  verbs: ["impersonate"]
# Discovery API access for dynamic resource handling
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wish-fulfiller-binding
subjects:
- kind: ServiceAccount
  name: wish-fulfiller
  namespace: wish-system
roleRef:
  kind: ClusterRole
  name: wish-fulfiller-role
  apiGroup: rbac.authorization.k8s.io
