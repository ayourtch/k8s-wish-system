---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wish-grantor
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wish-grantor-role
rules:
# Wish CRD access
- apiGroups: ["magic.k8s.io"]
  resources: ["wishes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["magic.k8s.io"]
  resources: ["wishes/status"]
  verbs: ["get", "patch", "update"]
# Read k8s API schema
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
# Read ConfigMaps and Secrets for config
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wish-grantor-binding
subjects:
- kind: ServiceAccount
  name: wish-grantor
  namespace: default
roleRef:
  kind: ClusterRole
  name: wish-grantor-role
  apiGroup: rbac.authorization.k8s.io
