---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wish-grantor-config
  namespace: wish-system
data:
  llmEndpoint: "http://localhost:11434/v1"
  llmModel: "llama3.2:latest"
  # Optional: reference to credentials secret
  # credentialsSecretName: "llm-credentials"
  # credentialsSecretKey: "apiKey"
  # Optional: allow per-namespace LLM config overrides
  # Set to "true" to allow namespaces to override LLM settings
  # Default: "false" (only wish-system config is used)
  # allowNamespaceOverride: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wish-fulfiller-permissions
  namespace: wish-system
data:
  allowedNamespaces: "default,staging"
  allowedResources: "pods,deployments,services,configmaps,secrets"
  forbiddenOperations: "delete:namespaces,delete:persistentvolumes"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: wish-system
type: Opaque
stringData:
  apiKey: ""  # Add your API key here if using a remote LLM
