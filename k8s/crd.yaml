apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wishes.magic.k8s.io
spec:
  group: magic.k8s.io
  names:
    kind: Wish
    plural: wishes
    singular: wish
    shortNames:
    - wsh
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - wish
            properties:
              wish:
                type: string
                description: "Natural language wish"
              autoFulfill:
                type: boolean
                default: false
                description: "Auto-execute after granting"
              dryRun:
                type: boolean
                default: true
                description: "If true, plan but don't execute"
              llmConfig:
                type: object
                properties:
                  endpoint:
                    type: string
                  model:
                    type: string
                  credentialsSecretRef:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Requested, Granted, Fulfilled, Failed]
              name:
                type: string
                description: "LLM-assigned semantic name"
              plan:
                type: object
                properties:
                  commands:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [kubectl, shell]
                        command:
                          type: string
                        yaml:
                          type: string
                  reasoning:
                    type: string
              dryRunResults:
                type: array
                items:
                  type: object
                  properties:
                    command:
                      type: string
                    expectedOutcome:
                      type: string
              fulfilled:
                type: boolean
                description: "Immutable once true"
              fulfilledAt:
                type: string
                format: date-time
              error:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Name
      type: string
      jsonPath: .status.name
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
