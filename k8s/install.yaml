---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wish-grantor
  namespace: wish-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wish-grantor-role
rules:
# Wish CRD access
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes/status"]
  verbs: ["get", "patch", "update"]
# Read k8s API schema
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
# Read ConfigMaps and Secrets for config
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wish-grantor-binding
subjects:
- kind: ServiceAccount
  name: wish-grantor
  namespace: wish-system
roleRef:
  kind: ClusterRole
  name: wish-grantor-role
  apiGroup: rbac.authorization.k8s.io
---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wish-fulfiller
  namespace: wish-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wish-fulfiller-role
rules:
# Wish CRD access
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes/status"]
  verbs: ["get", "patch", "update"]
# Impersonation permissions - allows wish-fulfiller to execute as the wish creator
- apiGroups: [""]
  resources: ["users", "groups", "serviceaccounts"]
  verbs: ["impersonate"]
# Discovery API access for dynamic resource handling
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wish-fulfiller-binding
subjects:
- kind: ServiceAccount
  name: wish-fulfiller
  namespace: wish-system
roleRef:
  kind: ClusterRole
  name: wish-fulfiller-role
  apiGroup: rbac.authorization.k8s.io
---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wish-grantor-config
  namespace: wish-system
data:
  llmEndpoint: "http://localhost:11434/v1"
  llmModel: "llama3.2:latest"
  # Optional: reference to credentials secret
  # credentialsSecretName: "llm-credentials"
  # credentialsSecretKey: "apiKey"
  # Optional: allow per-namespace LLM config overrides
  # Set to "true" to allow namespaces to override LLM settings
  # Default: "false" (only wish-system config is used)
  # allowNamespaceOverride: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wish-fulfiller-permissions
  namespace: wish-system
data:
  allowedNamespaces: "default,staging"
  allowedResources: "pods,deployments,services,configmaps,secrets"
  forbiddenOperations: "delete:namespaces,delete:persistentvolumes"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: wish-system
type: Opaque
stringData:
  apiKey: ""  # Add your API key here if using a remote LLM
