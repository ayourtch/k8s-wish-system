# Wish System - All-in-One Installation Manifest
# This file installs the complete wish-system in the wish-system namespace
#
# Installation:
#   kubectl apply -f https://raw.githubusercontent.com/YOUR_USERNAME/wish-system/main/k8s/install.yaml
#
# Or locally:
#   kubectl apply -f k8s/install.yaml
#
# To uninstall:
#   kubectl delete -f k8s/install.yaml
#
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: wish-system
  labels:
    app.kubernetes.io/name: wish-system
    app.kubernetes.io/component: operator
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wishes.wish.ayourt.ch
spec:
  conversion:
    strategy: None
  group: wish.ayourt.ch
  names:
    kind: Wish
    listKind: WishList
    plural: wishes
    shortNames:
    - wsh
    singular: wish
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.name
      name: Name
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              autoFulfill:
                default: false
                description: Auto-execute after granting
                type: boolean
              creator:
                description: Creator identity for RBAC impersonation
                properties:
                  groups:
                    description: User groups at creation time (for impersonation)
                    items:
                      type: string
                    type: array
                  username:
                    description: Kubernetes username for impersonation
                    type: string
                required:
                - username
                - groups
                type: object
              dryRun:
                default: true
                description: If true, plan but don't execute
                type: boolean
              llmConfig:
                properties:
                  credentialsSecretRef:
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    type: object
                  endpoint:
                    type: string
                  model:
                    type: string
                type: object
              targetNamespace:
                default: default
                description: Target namespace for deployed resources
                type: string
              wish:
                description: Natural language wish
                type: string
            required:
            - wish
            type: object
            x-kubernetes-validations:
            # Wish text is immutable once created
            - rule: "self.wish == oldSelf.wish"
              message: "wish text cannot be changed after creation"
            # Creator identity is immutable once set
            - rule: "!has(oldSelf.creator) || self.creator == oldSelf.creator"
              message: "creator identity cannot be changed after creation"
            # dryRun can only transition true→false (to fulfill), never back
            - rule: "oldSelf.dryRun || self.dryRun == oldSelf.dryRun"
              message: "dryRun cannot be re-enabled after disabling"
            # autoFulfill is immutable once set
            - rule: "self.autoFulfill == oldSelf.autoFulfill"
              message: "autoFulfill cannot be changed after creation"
            # targetNamespace is immutable
            - rule: "self.targetNamespace == oldSelf.targetNamespace"
              message: "targetNamespace cannot be changed after creation"
          status:
            properties:
              dryRunResults:
                items:
                  properties:
                    command:
                      type: string
                    expectedOutcome:
                      type: string
                  type: object
                type: array
              error:
                type: string
              fulfilled:
                description: Immutable once true
                type: boolean
              fulfilledAt:
                format: date-time
                type: string
              name:
                description: LLM-assigned semantic name
                type: string
              phase:
                enum:
                - Requested
                - Granted
                - Fulfilled
                - Failed
                type: string
              plan:
                properties:
                  commands:
                    items:
                      properties:
                        command:
                          type: string
                        type:
                          enum:
                          - kubectl
                          - shell
                          type: string
                        yaml:
                          type: string
                      type: object
                    type: array
                  reasoning:
                    type: string
                type: object
            type: object
            x-kubernetes-validations:
            # Execution plan is immutable once set by the grantor
            - rule: "!has(oldSelf.plan) || self.plan == oldSelf.plan"
              message: "execution plan cannot be modified once granted"
            # fulfilled is a one-way flag — cannot revert to false
            - rule: "!oldSelf.fulfilled || self.fulfilled"
              message: "fulfilled status cannot be reverted"
            # Fulfilled wishes cannot change phase
            - rule: "!has(oldSelf.phase) || oldSelf.phase != 'Fulfilled' || self.phase == 'Fulfilled'"
              message: "fulfilled wishes cannot change phase"
            # Granted wishes cannot revert to Requested
            - rule: "!has(oldSelf.phase) || oldSelf.phase != 'Granted' || self.phase != 'Requested'"
              message: "granted wishes cannot revert to requested"
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wish-grantor
  namespace: wish-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wish-grantor-role
rules:
# Wish CRD access
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes/status"]
  verbs: ["get", "patch", "update"]
# Read k8s API schema
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
# Read ConfigMaps and Secrets for config
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wish-grantor-binding
subjects:
- kind: ServiceAccount
  name: wish-grantor
  namespace: wish-system
roleRef:
  kind: ClusterRole
  name: wish-grantor-role
  apiGroup: rbac.authorization.k8s.io
---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wish-fulfiller
  namespace: wish-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wish-fulfiller-role
rules:
# Wish CRD access
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["wish.ayourt.ch"]
  resources: ["wishes/status"]
  verbs: ["get", "patch", "update"]
# Impersonation permissions - allows wish-fulfiller to execute as the wish creator
- apiGroups: [""]
  resources: ["users", "groups", "serviceaccounts"]
  verbs: ["impersonate"]
# Discovery API access for dynamic resource handling
- apiGroups: [""]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["apps", "batch", "networking.k8s.io", "rbac.authorization.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wish-fulfiller-binding
subjects:
- kind: ServiceAccount
  name: wish-fulfiller
  namespace: wish-system
roleRef:
  kind: ClusterRole
  name: wish-fulfiller-role
  apiGroup: rbac.authorization.k8s.io
---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wish-grantor-config
  namespace: wish-system
data:
  llmEndpoint: "http://localhost:11434/v1"
  llmModel: "llama3.2:latest"
  # Optional: reference to credentials secret
  # credentialsSecretName: "llm-credentials"
  # credentialsSecretKey: "apiKey"
  # Optional: allow per-namespace LLM config overrides
  # Set to "true" to allow namespaces to override LLM settings
  # Default: "false" (only wish-system config is used)
  # allowNamespaceOverride: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wish-fulfiller-permissions
  namespace: wish-system
data:
  allowedNamespaces: "default,staging"
  allowedResources: "pods,deployments,services,configmaps,secrets"
  forbiddenOperations: "delete:namespaces,delete:persistentvolumes"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: wish-system
type: Opaque
stringData:
  apiKey: ""  # Add your API key here if using a remote LLM
